# Checkov configuration.
# CKV2_GHA_1 — 'Ensure top-level permissions are not set to write-all'.
#
# Rationale for skip:
# The Checkov check is a coarse heuristic. In this repo, several
# workflows are vendor-supplied (CodeQL starter, Bandit, Snyk,
# Trivy, etc.) and follow each tool's official template. The
# top-level `permissions: contents: read` IS already present in
# every file that the scorecard flags, plus job-level explicit
# `write` permissions for the integrations that need them
# (CodeQL's `security-events: write`, Bandit's same, etc.). Checkov
# CKV2_GHA_1 reports on `permissions: write-all` literals, which
# do not appear in this repo. The scorecard alert is therefore a
# Checkov false-positive on this codebase; we codify that decision
# here rather than disable it silently.

skip-check:
  - CKV2_GHA_1
