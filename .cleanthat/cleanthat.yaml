syntax_version: "2023-01-09"
meta:
  labels:
    - "cleanthat"
  refs:
    protected_patterns:
      - "develop"
      - "main"
      - "master"
source_code:
  excludes: []
  encoding: "UTF-8"
  line_ending: "GIT"
engines:
  - engine: "spotless"
    skip: false
    steps:
      - id: "spotless"
        parameters:
          configuration: "repository:/.cleanthat/spotless.yaml"
