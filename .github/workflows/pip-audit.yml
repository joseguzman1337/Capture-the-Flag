name: pip-audit

# Address Scorecard VulnerabilitiesID: run pip-audit on Backend Python deps
# on every push and PR. Findings are uploaded as SARIF to the Security tab
# so Dependabot and the scorecard can see the repo is actively scanned.
# https://github.com/pypa/pip-audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # Weekly scan on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  pip-audit:
    name: Backend Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Audit pinned requirements
        working-directory: Backend
        run: |
          uv pip install --system --require-hashes -r requirements.txt
          pip-audit --strict --requirement requirements.txt --format json --output pip-audit.json || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: Backend/pip-audit.json
          category: pip-audit
