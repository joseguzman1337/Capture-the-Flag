name: Backend tests

# Address Scorecard CITestsID: run Django tests on every push and PR.
# This ensures the scorecard's "CI test" check sees that merged PRs were
# covered by an automated test run, not just linting.

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    name: Django test suite
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Install Backend dependencies
        working-directory: Backend
        run: uv pip install --system --require-hashes -r requirements.txt

      - name: Run Django tests
        working-directory: Backend
        run: |
          python manage.py test --verbosity=2
