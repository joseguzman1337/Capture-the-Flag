name: Backend tests

# Address Scorecard CITestsID: run Django tests on every push and PR.
# This ensures the scorecard's "CI test" check sees that merged PRs were
# covered by an automated test run, not just linting.

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    name: Django test suite
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install Backend dependencies
        working-directory: Backend
        run: uv pip install --system --require-hashes -r requirements.txt

      - name: Run Django tests
        working-directory: Backend
        run: |
          python manage.py test --verbosity=2
